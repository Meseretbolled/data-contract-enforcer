    in production.
  columns:
  - name: verdict_id
    tests:
    - not_null
    - unique
    description: Unique identifier for verdict. UUIDv4.
  - name: target_ref
    tests:
    - not_null
    - accepted_values:
        values:
        - https://github.com/Meseretbolled/apex-ledger
