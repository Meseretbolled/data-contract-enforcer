      ''https://github.com/Meseretbolled/automaton-auditor'', ''https://github.com/Meseretbolled/brownfield-cartographer'',
      ''https://github.com/Meseretbolled/document-intelligence-refinery''].'
  - name: rubric_id
    tests:
    - not_null
  - name: rubric_version
    tests:
    - not_null
  - name: overall_verdict
    tests:
    - not_null
    - accepted_values:
        values:
        - FAIL
        - PASS
        - WARN
    description: 'Enumerated value. Allowed: [''FAIL'', ''PASS'', ''WARN''].'
  - name: overall_score
    tests:
    - not_null
    description: Observed range [1.670, 4.330], mean=2.994, stddev=0.552.
