    description: 'BREAKING CHANGE if converted to 0-100 scale. Range: [0.0, 1.0].'
    tests:
    - not_null
    - dbt_utils.expression_is_true:
        expression: confidence >= 0.0 and confidence <= 1.0
  - name: evaluated_at
    tests:
    - not_null
    description: ISO 8601 timestamp in UTC (Z suffix required).
