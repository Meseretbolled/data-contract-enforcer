# contract_registry/subscriptions.yaml
# Manually maintained registry of inter-system data dependencies.
# Every arrow in the data flow diagram must have an entry here.
# This is the PRIMARY source for blast radius computation.

subscriptions:

  - contract_id: week3-document-refinery-extractions
    subscriber_id: week4-cartographer
    subscriber_team: week4
    tier: 1
    fields_consumed: [doc_id, extracted_facts, extraction_model]
    breaking_fields:
      - field: extracted_facts.confidence
        reason: used for node ranking; scale change (0.0-1.0 vs 0-100) breaks ordering logic silently
      - field: doc_id
        reason: primary key used as node identity in lineage graph
    failure_mode_description: >
      If extracted_facts.confidence changes scale, cartographer scores all lineage nodes
      as 100x more reliable than they are. Every reliability-based filter produces wrong
      results silently — no exception is raised, no pipeline crashes.
    on_violation_action: BLOCK_DEPLOY
    validation_mode: ENFORCE
    registered_at: '2026-01-10T09:00:00Z'
    contact: meseretbolled@gmail.com

  - contract_id: week3-document-refinery-extractions
    subscriber_id: week7-contract-enforcer
    subscriber_team: week7
    tier: 1
    fields_consumed: [extracted_facts.confidence, doc_id, extracted_at]
    breaking_fields:
      - field: extracted_facts.confidence
        reason: AI extension embedding drift baseline depends on 0.0-1.0 scale
      - field: doc_id
        reason: primary key for violation attribution chain
    failure_mode_description: >
      Inflated confidence values cause the enforcer to report artificially high data
      health scores, masking real quality problems. Embedding drift baseline becomes
      invalid and all future drift comparisons are meaningless.
    on_violation_action: ALERT_AND_AUDIT
    validation_mode: AUDIT
    registered_at: '2026-01-10T09:00:00Z'
    contact: meseretbolled@gmail.com

  - contract_id: week4-lineage-snapshots
    subscriber_id: week7-violation-attributor
    subscriber_team: week7
    tier: 1
    fields_consumed: [snapshot_id, node_node_id, git_commit, captured_at]
    breaking_fields:
      - field: node_node_id
        reason: attributor traverses graph using node_id as key; format change breaks traversal
      - field: git_commit
        reason: blame chain requires valid 40-char hex commit hash
    failure_mode_description: >
      If node_node_id format changes, BFS traversal finds zero consumers and blast
      radius is reported as empty — violations are attributed to no-one. If git_commit
      is invalid, blame chain returns no candidates and the violation goes untracked.
    on_violation_action: BLOCK_DEPLOY
    validation_mode: ENFORCE
    registered_at: '2026-01-10T09:00:00Z'
    contact: meseretbolled@gmail.com

  - contract_id: week5-event-records
    subscriber_id: week7-contract-enforcer
    subscriber_team: week7
    tier: 2
    fields_consumed: [event_id, event_type, aggregate_id, sequence_number, occurred_at, recorded_at]
    breaking_fields:
      - field: occurred_at
        reason: temporal ordering contract requires occurred_at <= recorded_at
      - field: sequence_number
        reason: monotonic increase check depends on integer sequence per aggregate
      - field: event_type
        reason: PascalCase enum validation breaks if format changes
    failure_mode_description: >
      Out-of-order events cause the enforcer to miss causal violations. A negative
      sequence_number makes monotonic checks always pass. Non-PascalCase event types
      cause the enum check to fire false positives on every record.
    on_violation_action: QUARANTINE
    validation_mode: ENFORCE
    registered_at: '2026-01-10T09:00:00Z'
    contact: meseretbolled@gmail.com

  - contract_id: langsmith-traces
    subscriber_id: week7-ai-extensions
    subscriber_team: week7
    tier: 2
    fields_consumed: [id, name, run_type, start_time, end_time, total_tokens, prompt_tokens, completion_tokens]
    breaking_fields:
      - field: run_type
        reason: AI extension filters by run_type for LLM vs chain classification
      - field: total_tokens
        reason: token budget monitoring baseline depends on this field
      - field: start_time
        reason: latency computation requires valid ISO 8601 timestamps
    failure_mode_description: >
      If run_type changes format, all LLM traces are misclassified as chain traces
      and violation rate tracking becomes meaningless. If total_tokens is always zero,
      cost monitoring never fires — token budget violations go undetected.
    on_violation_action: ALERT_AND_AUDIT
    validation_mode: AUDIT
    registered_at: '2026-01-10T09:00:00Z'
    contact: meseretbolled@gmail.com

  - contract_id: week2-verdict-records
    subscriber_id: week7-ai-extensions
    subscriber_team: week7
    tier: 2
    fields_consumed: [verdict_id, overall_verdict, overall_score, confidence, evaluated_at]
    breaking_fields:
      - field: overall_verdict
        reason: output schema violation rate check expects exactly PASS/FAIL/WARN
      - field: confidence
        reason: LLM output confidence must remain 0.0-1.0 float range
    failure_mode_description: >
      If overall_verdict gains a new enum value, the violation rate check fires on
      every verdict record — 100% false positive rate. If confidence exceeds 1.0,
      the drift check baseline becomes invalid for all future comparisons.
    on_violation_action: ALERT_AND_AUDIT
    validation_mode: AUDIT
    registered_at: '2026-01-10T09:00:00Z'
    contact: meseretbolled@gmail.com

  - contract_id: week1-intent-records
    subscriber_id: week2-digital-courtroom
    subscriber_team: week2
    tier: 3
    fields_consumed: [intent_id, code_refs, description, created_at]
    breaking_fields:
      - field: code_ref_confidence
        reason: verdict scoring uses confidence to weight intent-code alignment
      - field: code_ref_file
        reason: target_ref in verdict records references code_refs.file paths
    failure_mode_description: >
      If code_ref_confidence changes scale, every verdict score is wrong by a factor
      of 100. If code_ref_file paths change format, target_ref lookups return null
      and verdicts cannot be traced back to source intent records.
    on_violation_action: ALERT_AND_AUDIT
    validation_mode: AUDIT
    registered_at: '2026-01-10T09:00:00Z'
    contact: meseretbolled@gmail.com
