      the format 'YYYY-MM-DDTHH:mm:ss.SSSSSS+00:00'.
    llm_cross_column: The start_time must be less than the corresponding end_time
      in the same record.
  end_time:
    type: string
    required: true
    description: The end time of the langsmith execution, expressed as an ISO 8601
      datetime string with timezone information.
    llm_business_rule: The datetime string must be in the format 'YYYY-MM-DDTHH:mm:ss.ssssss+HH:MM'
      and must represent a valid datetime in the future.
    llm_cross_column: The end_time must be greater than the start_time in the same
      record.
