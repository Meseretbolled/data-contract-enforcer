      table.
    llm_business_rule: must be a valid UUID in the format 'xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx'
  name:
    type: string
    required: true
    description: The name of the task or process performed as part of the data engineering
      system.
    llm_business_rule: 'The name must be a non-empty string and be one of the following
      values: [''load_extracted_facts'', ''load_applicant_registry'', ''open_credit_record'',
      ''validate_inputs'', ''write_output''].'
    llm_cross_column: The name must be consistent with the other columns in the same
      record, such as the run_type, inputs, error, and timing information.
  run_type:
    type: string
    required: true
    description: The type of run or process that generated this trace, such as 'chain'
      or other types of execution flows.
    llm_business_rule: must be one of ['chain']
  inputs_applicant_id:
    type: string
    required: false
    enum:
    - COMP-001
    - COMP-007
