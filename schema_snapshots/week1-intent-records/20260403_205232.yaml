schema:
  intent_id:
    type: string
    required: true
    format: uuid
    description: Unique identifier for intent. UUIDv4.
  description:
    type: string
    required: true
    description: A short description of the intent or purpose behind a specific code
      change or implementation step.
    llm_business_rule: Must be a non-empty string with a maximum length of 1000 characters.
    llm_cross_column: The description should be consistent with the code references
      provided in the adjacent columns (code_ref_file, code_ref_line_start, code_ref_line_end,
      code_ref_symbol, code_ref_confidence).
  created_at:
    type: string
    required: true
    format: date-time
    description: ISO 8601 timestamp in UTC (Z suffix required).
  code_ref_file:
    type: string
    required: true
    description: A list of file paths that the intent record is associated with, likely
      within the source code repository.
    llm_business_rule: The value must be a list of valid file paths as string values.
    llm_cross_column: The 'code_ref_line_start', 'code_ref_line_end', 'code_ref_symbol',
      and 'code_ref_confidence' columns must reference the same set of files in this
      column.
  code_ref_line_start:
    type: integer
    required: true
    description: Observed range [12.000, 120.000], mean=61.180, stddev=29.435.
  code_ref_line_end:
    type: integer
    required: true
    description: Observed range [22.000, 135.000], mean=85.720, stddev=28.216.
  code_ref_symbol:
    type: string
    required: true
    description: A unique code reference symbol that represents the source code location
      of the intent.
    llm_business_rule: Must be a non-empty string consisting of alphanumeric characters,
      underscores, and hyphens.
    llm_cross_column: The combination of 'code_ref_file', 'code_ref_line_start', and
      'code_ref_line_end' must uniquely identify the source code location of the intent.
  code_ref_confidence:
    type: number
    required: true
    minimum: 0.0
    maximum: 1.0
    description: Confidence score. MUST remain in 0.0-1.0 float range. A value of
      0.87 means 87% confidence. BREAKING CHANGE if converted to integer 0-100 percentage
      scale — all downstream threshold comparisons will silently produce wrong results.
